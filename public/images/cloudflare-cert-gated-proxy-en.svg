<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 600" font-family="ui-sans-serif, system-ui, -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif" role="img" aria-label="Flow: create DNS-only records, let Firebase issue the certificate, poll for ACTIVE, then flip only the serving records to proxied">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arr2o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f97316"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="600" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="48" font-size="21" font-weight="700" fill="#18181b">Why proxy ON comes last</text>
  <text x="40" y="74" font-size="12.5" fill="#a1a1aa">Stay DNS-only until the certificate is issued — the Cloudflare Proxy workflow</text>

  <!-- step 1 -->
  <rect x="40" y="100" width="256" height="170" rx="12" fill="#fafafa" stroke="#e4e4e7" stroke-width="1.3"/>
  <circle cx="66" cy="128" r="12" fill="#52525b"/>
  <text x="66" y="133" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">1</text>
  <text x="86" y="133" font-size="14" font-weight="700" fill="#27272a">Create DNS records</text>
  <rect x="60" y="150" width="36" height="36" rx="9" fill="#94a3b8"/>
  <text x="78" y="174" text-anchor="middle" font-size="15" fill="#ffffff">☁</text>
  <text x="108" y="164" font-size="11.5" fill="#3f3f46">A / CNAME records</text>
  <text x="108" y="181" font-size="11.5" fill="#3f3f46">pointing at hosting</text>
  <rect x="60" y="206" width="216" height="34" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="168" y="227" text-anchor="middle" font-size="11.5" fill="#475569">proxied: false (DNS-only)</text>

  <path d="M300,185 L328,185" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr2)"/>

  <!-- step 2 -->
  <rect x="332" y="100" width="256" height="170" rx="12" fill="#fefce8" stroke="#fde68a" stroke-width="1.3"/>
  <circle cx="358" cy="128" r="12" fill="#d97706"/>
  <text x="358" y="133" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">2</text>
  <text x="378" y="133" font-size="14" font-weight="700" fill="#92400e">Firebase issues the cert</text>
  <rect x="352" y="150" width="36" height="36" rx="9" fill="#f59e0b"/>
  <text x="370" y="174" text-anchor="middle" font-size="15" fill="#ffffff">🔥</text>
  <text x="400" y="164" font-size="11.5" fill="#3f3f46">ownership verification +</text>
  <text x="400" y="181" font-size="11.5" fill="#3f3f46">ACME challenge</text>
  <rect x="352" y="206" width="216" height="34" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="460" y="227" text-anchor="middle" font-size="11" fill="#c2410c">reaches origin directly, not via Cloudflare</text>

  <path d="M592,185 L620,185" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr2)"/>

  <!-- step 3 -->
  <rect x="624" y="100" width="256" height="170" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.3"/>
  <circle cx="650" cy="128" r="12" fill="#4f46e5"/>
  <text x="650" y="133" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">3</text>
  <text x="670" y="133" font-size="14" font-weight="700" fill="#3730a3">Poll for ACTIVE</text>
  <rect x="644" y="150" width="36" height="36" rx="9" fill="#4f46e5"/>
  <text x="662" y="174" text-anchor="middle" font-size="15" fill="#ffffff">⟳</text>
  <text x="692" y="164" font-size="11.5" fill="#3f3f46">check host / cert status</text>
  <text x="692" y="181" font-size="11.5" fill="#3f3f46">every 15 seconds</text>
  <rect x="644" y="206" width="216" height="34" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="752" y="227" text-anchor="middle" font-size="11.5" font-weight="600" fill="#4f46e5">HOST_ACTIVE &amp;&amp; CERT_ACTIVE</text>

  <path d="M884,185 L912,185" fill="none" stroke="#f97316" stroke-width="1.8" marker-end="url(#arr2o)"/>

  <!-- step 4 -->
  <rect x="916" y="100" width="256" height="170" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <circle cx="942" cy="128" r="12" fill="#ea580c"/>
  <text x="942" y="133" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">4</text>
  <text x="962" y="133" font-size="14" font-weight="700" fill="#9a3412">Flip proxy ON</text>
  <rect x="936" y="150" width="36" height="36" rx="9" fill="#ea580c"/>
  <text x="954" y="174" text-anchor="middle" font-size="15" fill="#ffffff">☁</text>
  <text x="984" y="164" font-size="11.5" fill="#3f3f46">only the serving records</text>
  <text x="984" y="181" font-size="11.5" fill="#3f3f46">get proxied: true</text>
  <rect x="936" y="206" width="216" height="34" rx="8" fill="#ffffff" stroke="#fdba74"/>
  <text x="1044" y="227" text-anchor="middle" font-size="11.5" fill="#c2410c">orange cloud</text>

  <!-- warning panel -->
  <rect x="40" y="306" width="1132" height="204" rx="14" fill="#fefce8" stroke="#facc15" stroke-width="1.5"/>
  <rect x="66" y="330" width="38" height="38" rx="9" fill="#f59e0b"/>
  <text x="85" y="356" text-anchor="middle" font-size="17" fill="#ffffff">⚠</text>
  <text x="120" y="355" font-size="15.5" font-weight="700" fill="#92400e">Why wait for cert ACTIVE</text>

  <text x="66" y="394" font-size="12.5" fill="#713f12">Turn the proxy on before the certificate exists, and the traffic for domain-ownership verification and cert issuance hides behind</text>
  <text x="66" y="414" font-size="12.5" fill="#713f12">Cloudflare's proxy (different certificate, different IPs) — the ACME validation fails and delivery breaks. So the switch happens only</text>
  <text x="66" y="434" font-size="12.5" fill="#713f12">"after Firebase has finished issuing the cert". Issuance takes time, so this stage alone is an independent, re-runnable workflow,</text>
  <text x="66" y="454" font-size="12.5" fill="#713f12">and a pending timeout is not treated as a failure.</text>
  <text x="66" y="486" font-size="12.5" fill="#a16207">Already-proxied records are skipped (idempotent). Ownership TXT and ACME-challenge CNAMEs stay DNS-only.</text>

  <!-- footer -->
  <text x="590" y="556" text-anchor="middle" font-size="12.5" fill="#a1a1aa">Create DNS-only → let Firebase issue the cert → wait for ACTIVE → proxy only the serving records. The order carries meaning.</text>
</svg>
