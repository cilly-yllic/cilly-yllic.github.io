<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="ui-sans-serif, system-ui, -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif" role="img" aria-label="Platform Sync pipeline: config in Git as source of truth, syncing Cloudflare DNS then Logto, dispatching proxy and env-bundle workflows on successful apply">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f97316"/>
    </marker>
    <marker id="arrTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d9488"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="720" fill="#ffffff"/>

  <!-- ══ Source of Truth (Git) ══ -->
  <rect x="30" y="60" width="250" height="300" rx="14" fill="#fefce8" stroke="#f59e0b" stroke-width="1.4"/>
  <rect x="30" y="60" width="250" height="44" rx="14" fill="#f59e0b"/>
  <rect x="30" y="90" width="250" height="14" fill="#f59e0b"/>
  <text x="52" y="88" font-size="15" font-weight="700" fill="#ffffff">Source of Truth (Git)</text>

  <rect x="48" y="122" width="214" height="100" rx="10" fill="#ffffff" stroke="#e4e4e7"/>
  <rect x="60" y="136" width="26" height="26" rx="6" fill="#475569"/>
  <text x="73" y="154" text-anchor="middle" font-size="12" fill="#ffffff">≡</text>
  <text x="96" y="150" font-size="13.5" font-weight="700" fill="#27272a">terraform.yml</text>
  <text x="96" y="168" font-size="11" fill="#71717a">service / environments</text>
  <text x="60" y="192" font-size="11" fill="#52525b">hosting / domains</text>
  <text x="60" y="208" font-size="11" fill="#52525b">= where DNS comes from</text>

  <rect x="48" y="234" width="214" height="100" rx="10" fill="#ffffff" stroke="#e4e4e7"/>
  <rect x="60" y="248" width="26" height="26" rx="6" fill="#475569"/>
  <text x="73" y="266" text-anchor="middle" font-size="12" fill="#ffffff">≡</text>
  <text x="96" y="262" font-size="13.5" font-weight="700" fill="#27272a">platform.yml</text>
  <text x="96" y="280" font-size="11" fill="#71717a">Logto auth rules</text>
  <text x="60" y="304" font-size="11" fill="#52525b">tenant ⇄ env_group</text>
  <text x="60" y="320" font-size="11" fill="#52525b">mapping</text>

  <!-- arrow SoT -> Platform Sync -->
  <path d="M282,210 L336,210" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- ══ Platform Sync · GitHub Actions ══ -->
  <rect x="340" y="60" width="420" height="440" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
  <rect x="340" y="60" width="420" height="44" rx="14" fill="#6366f1"/>
  <rect x="340" y="90" width="420" height="14" fill="#6366f1"/>
  <text x="362" y="88" font-size="15" font-weight="700" fill="#ffffff">Platform Sync · GitHub Actions</text>

  <text x="362" y="130" font-size="12" fill="#4f46e5">workflow_dispatch (defaults to plan — accident-proof)</text>
  <rect x="362" y="142" width="140" height="30" rx="15" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="432" y="161" text-anchor="middle" font-size="12" fill="#4f46e5">plan (diff only)</text>
  <rect x="512" y="142" width="150" height="30" rx="15" fill="#6366f1"/>
  <text x="587" y="161" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">apply (real sync)</text>

  <!-- step 1 -->
  <circle cx="384" cy="222" r="13" fill="#6366f1"/>
  <text x="384" y="227" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
  <rect x="408" y="192" width="330" height="62" rx="10" fill="#ffffff" stroke="#e0e7ff"/>
  <rect x="422" y="206" width="34" height="34" rx="8" fill="#f97316"/>
  <text x="439" y="229" text-anchor="middle" font-size="15" fill="#ffffff">☁</text>
  <text x="470" y="220" font-size="13.5" font-weight="700" fill="#27272a">Cloudflare DNS sync</text>
  <text x="470" y="240" font-size="11" fill="#71717a">creates missing records, DNS-only</text>

  <!-- order arrow -->
  <path d="M384,236 L384,282" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="396" y="266" font-size="10.5" fill="#71717a">order</text>

  <!-- step 2 -->
  <circle cx="384" cy="300" r="13" fill="#6366f1"/>
  <text x="384" y="305" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <rect x="408" y="270" width="330" height="62" rx="10" fill="#ffffff" stroke="#e0e7ff"/>
  <rect x="422" y="284" width="34" height="34" rx="8" fill="#6366f1"/>
  <text x="439" y="307" text-anchor="middle" font-size="14" fill="#ffffff">🛡</text>
  <text x="470" y="298" font-size="13.5" font-weight="700" fill="#27272a">Logto sync</text>
  <text x="470" y="318" font-size="11" fill="#71717a">Apps / API Resources / Roles</text>

  <!-- keyless pill -->
  <rect x="362" y="356" width="376" height="34" rx="17" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="380" y="377" font-size="11.5" fill="#3f3f46">🔒 keyless · impersonates read-only SAs via WIF (OIDC)</text>

  <!-- arrow to Slack -->
  <path d="M550,502 L550,540" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="400" y="544" width="330" height="48" rx="10" fill="#ffffff" stroke="#e4e4e7"/>
  <rect x="414" y="556" width="26" height="26" rx="6" fill="#4a154b"/>
  <text x="427" y="574" text-anchor="middle" font-size="12" fill="#ffffff">#</text>
  <text x="452" y="574" font-size="12.5" fill="#3f3f46">Slack notification (what was synced)</text>

  <!-- ═ dispatch arrows ═ -->
  <circle cx="800" cy="290" r="14" fill="#0d9488"/>
  <text x="800" y="295" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
  <path d="M762,220 C790,215 800,190 836,186" fill="none" stroke="#f97316" stroke-width="1.8" marker-end="url(#arrOrange)"/>
  <path d="M762,330 C790,340 800,382 836,388" fill="none" stroke="#0d9488" stroke-width="1.8" marker-end="url(#arrTeal)"/>

  <!-- ══ dispatched on successful apply ══ -->
  <rect x="840" y="60" width="310" height="440" rx="14" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.4"/>
  <rect x="840" y="60" width="310" height="44" rx="14" fill="#0d9488"/>
  <rect x="840" y="90" width="310" height="14" fill="#0d9488"/>
  <text x="862" y="88" font-size="15" font-weight="700" fill="#ffffff">dispatched on successful apply</text>

  <!-- Cloudflare Proxy -->
  <rect x="858" y="122" width="274" height="150" rx="10" fill="#ffffff" stroke="#fdba74" stroke-width="1.4"/>
  <rect x="872" y="138" width="36" height="36" rx="9" fill="#f97316"/>
  <text x="890" y="162" text-anchor="middle" font-size="16" fill="#ffffff">☁</text>
  <text x="920" y="152" font-size="14" font-weight="700" fill="#27272a">Cloudflare Proxy</text>
  <text x="920" y="170" font-size="11" fill="#71717a">independent workflow, re-runnable</text>
  <rect x="872" y="186" width="246" height="68" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="886" y="212" font-size="11.5" fill="#c2410c">waits until the cert is ACTIVE,</text>
  <text x="886" y="230" font-size="11.5" fill="#c2410c">then proxies only the serving records</text>

  <!-- Env Bundle -->
  <rect x="858" y="292" width="274" height="150" rx="10" fill="#ffffff" stroke="#e4e4e7"/>
  <rect x="872" y="308" width="36" height="36" rx="9" fill="#3f3f46"/>
  <text x="890" y="332" text-anchor="middle" font-size="15" fill="#ffffff">🔒</text>
  <text x="920" y="322" font-size="14" font-weight="700" fill="#27272a">Env Bundle</text>
  <text x="920" y="340" font-size="11" fill="#71717a">GPG-encrypts env value sources</text>
  <rect x="872" y="356" width="246" height="68" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="886" y="382" font-size="11.5" fill="#334155">decrypt-and-compare: the PR updates</text>
  <text x="886" y="400" font-size="11.5" fill="#334155">only when values actually changed</text>

  <!-- ══ Legend ══ -->
  <rect x="30" y="628" width="1120" height="62" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="52" y="665" font-size="12.5" font-weight="700" fill="#334155">Legend</text>
  <path d="M120,660 L154,660" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="162" y="665" font-size="11.5" fill="#52525b">control flow</text>
  <path d="M248,660 L282,660" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="290" y="665" font-size="11.5" fill="#52525b">order / keyless</text>
  <rect x="392" y="650" width="16" height="16" rx="4" fill="#f97316"/>
  <text x="416" y="665" font-size="11.5" fill="#52525b">Cloudflare</text>
  <rect x="496" y="650" width="16" height="16" rx="4" fill="#6366f1"/>
  <text x="520" y="665" font-size="11.5" fill="#52525b">Logto / Actions</text>
  <rect x="626" y="650" width="16" height="16" rx="4" fill="#3f3f46"/>
  <text x="650" y="665" font-size="11.5" fill="#52525b">encryption (GPG)</text>
  <rect x="768" y="650" width="16" height="16" rx="4" fill="#0d9488"/>
  <text x="792" y="665" font-size="11.5" fill="#52525b">post-apply dispatch</text>
  <rect x="928" y="650" width="16" height="16" rx="4" fill="#16a34a"/>
  <text x="952" y="665" font-size="11.5" fill="#52525b">Pull Request</text>
</svg>
